name: Upwind Image Scanning

on:
  push:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Image Tag
        id: tag
        run: |
          BRANCH="${{ github.ref_name }}"
          DATE=$(date -u '+%d%m%Y')
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          echo "image_tag=upwind-security-demo:${BRANCH}-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker Image
        run: |
          docker build . -t ${{ steps.tag.outputs.image_tag }}

      - name: Upwind Security ShiftLeft Scan
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ steps.tag.outputs.image_tag }}
          pull_image: false

      - name: Upwind Security ShiftLeft Image Publish
        uses: upwindsecurity/shiftleft-create-image-publish-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ steps.tag.outputs.image_tag }}
          pull_image: false
